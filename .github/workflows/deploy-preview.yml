name: Deploy Preview

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy (leave empty for current branch)'
        required: false
        type: string
      ref:
        description: 'Branch name to deploy'
        required: true
        type: string

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.head_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}

      - name: Configure preview worker
        run: |
          node -e "
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('dist/server/wrangler.json', 'utf8'));
          config.name = 'muslim-daily-tools-preview';
          config.routes = [{ pattern: 'preview.muslimdailytools.com', custom_domain: true }];
          fs.writeFileSync('dist/server/wrangler.json', JSON.stringify(config, null, 2));
          "

      - name: Deploy to Cloudflare Workers (Preview)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
        env:
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = 'https://preview.muslimdailytools.com';
            const body = `## 🚀 Preview Deployment

            Your preview is ready!

            **Preview URL:** ${url}

            This preview will be updated on each push to this PR.

            ---
            *Note: Preview deployments may take a minute to reflect the latest changes.*`;

            // Get PR number from input or context
            const prNumber = '${{ github.event.inputs.pr_number }}' || context.issue?.number;

            if (!prNumber) {
              console.log('No PR number available, skipping comment');
              return;
            }

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
